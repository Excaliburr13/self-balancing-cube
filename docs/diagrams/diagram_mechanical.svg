<svg width="800" height="620" viewBox="0 0 800 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="620" fill="#0d1117"/>
  <text x="400" y="30" fill="#e6edf3" font-size="16" font-weight="bold" text-anchor="middle">Self-Balancing Cube — Mechanical Cross-Section (150mm)</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Cube outer shell -->
  <rect x="175" y="60" width="300" height="300" rx="6" fill="none" stroke="#888780" stroke-width="2.5"/>

  <!-- Wall shading -->
  <rect x="175" y="60" width="300" height="8" fill="#444441" opacity="0.8"/>
  <rect x="175" y="352" width="300" height="8" fill="#444441" opacity="0.8"/>
  <rect x="175" y="60" width="8" height="300" fill="#444441" opacity="0.8"/>
  <rect x="467" y="60" width="8" height="300" fill="#444441" opacity="0.8"/>

  <!-- Corner pieces (aluminum) -->
  <rect x="175" y="60" width="18" height="18" rx="2" fill="#B4B2A9"/>
  <rect x="457" y="60" width="18" height="18" rx="2" fill="#B4B2A9"/>
  <rect x="175" y="342" width="18" height="18" rx="2" fill="#B4B2A9"/>
  <rect x="457" y="342" width="18" height="18" rx="2" fill="#B4B2A9"/>

  <!-- PCB tray (bottom) -->
  <rect x="190" y="308" width="270" height="42" rx="4" fill="#042C53" stroke="#378ADD" stroke-width="1"/>
  <text x="325" y="334" fill="#85B7EB" font-size="11" font-weight="bold" text-anchor="middle">Nucleo F446RE + SimpleFOC shields</text>

  <!-- Battery -->
  <rect x="210" y="256" width="230" height="46" rx="4" fill="#412402" stroke="#BA7517" stroke-width="1"/>
  <text x="325" y="284" fill="#EF9F27" font-size="11" font-weight="bold" text-anchor="middle">3S LiPo 1300mAh</text>

  <!-- Motor X — left wall -->
  <circle cx="192" cy="210" r="30" fill="none" stroke="#D85A30" stroke-width="1.5"/>
  <circle cx="192" cy="210" r="9" fill="#F0997B" stroke="#D85A30" stroke-width="1"/>
  <line x1="192" y1="180" x2="192" y2="240" stroke="#D85A30" stroke-width="0.8" stroke-dasharray="3 2"/>
  <line x1="162" y1="210" x2="222" y2="210" stroke="#D85A30" stroke-width="0.8" stroke-dasharray="3 2"/>
  <text x="192" y="252" fill="#D85A30" font-size="10" text-anchor="middle">wheel X</text>
  <text x="192" y="264" fill="#993C1D" font-size="9" text-anchor="middle">(roll)</text>

  <!-- Motor Y — top wall -->
  <circle cx="325" cy="78" r="30" fill="none" stroke="#D85A30" stroke-width="1.5"/>
  <circle cx="325" cy="78" r="9" fill="#F0997B" stroke="#D85A30" stroke-width="1"/>
  <line x1="325" y1="48" x2="325" y2="108" stroke="#D85A30" stroke-width="0.8" stroke-dasharray="3 2"/>
  <line x1="295" y1="78" x2="355" y2="78" stroke="#D85A30" stroke-width="0.8" stroke-dasharray="3 2"/>
  <text x="325" y="122" fill="#D85A30" font-size="10" text-anchor="middle">wheel Y (pitch)</text>

  <!-- Motor Z — right wall -->
  <circle cx="458" cy="210" r="30" fill="none" stroke="#D85A30" stroke-width="1.5"/>
  <circle cx="458" cy="210" r="9" fill="#F0997B" stroke="#D85A30" stroke-width="1"/>
  <line x1="458" y1="180" x2="458" y2="240" stroke="#D85A30" stroke-width="0.8" stroke-dasharray="3 2"/>
  <line x1="428" y1="210" x2="488" y2="210" stroke="#D85A30" stroke-width="0.8" stroke-dasharray="3 2"/>
  <text x="458" y="252" fill="#D85A30" font-size="10" text-anchor="middle">wheel Z</text>
  <text x="458" y="264" fill="#993C1D" font-size="9" text-anchor="middle">(yaw)</text>

  <!-- IMU at center -->
  <rect x="308" y="193" width="34" height="34" rx="3" fill="#04342C" stroke="#1D9E75" stroke-width="1"/>
  <text x="325" y="215" fill="#5DCAA5" font-size="8" text-anchor="middle">IMU</text>

  <!-- CoM marker -->
  <circle cx="325" cy="210" r="5" fill="none" stroke="#888780" stroke-width="1.5"/>
  <circle cx="325" cy="210" r="2" fill="#888780"/>

  <!-- Axis arrows -->
  <line x1="325" y1="210" x2="375" y2="210" stroke="#378ADD" stroke-width="2" marker-end="url(#arr)"/>
  <text x="382" y="214" fill="#378ADD" font-size="12" font-weight="bold">X</text>
  <line x1="325" y1="210" x2="325" y2="160" stroke="#1D9E75" stroke-width="2" marker-end="url(#arr)"/>
  <text x="330" y="155" fill="#1D9E75" font-size="12" font-weight="bold">Y</text>
  <line x1="325" y1="210" x2="291" y2="176" stroke="#BA7517" stroke-width="2" marker-end="url(#arr)"/>
  <text x="278" y="172" fill="#BA7517" font-size="12" font-weight="bold">Z</text>

  <!-- Balance point triangle -->
  <polygon points="325,360 310,382 340,382" fill="none" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="325" y="398" fill="#1D9E75" font-size="10" text-anchor="middle">balance corner</text>

  <!-- Right-side labels with leader lines -->
  <line x1="475" y1="68" x2="540" y2="90" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2"/>
  <circle cx="475" cy="68" r="2" fill="#888780"/>
  <text x="545" y="94" fill="#B4B2A9" font-size="11">2020 aluminum</text>
  <text x="545" y="108" fill="#888780" font-size="10">extrusion frame</text>

  <line x1="475" y1="210" x2="540" y2="160" stroke="#D85A30" stroke-width="0.5" stroke-dasharray="3 2"/>
  <circle cx="475" cy="210" r="2" fill="#D85A30"/>
  <text x="545" y="164" fill="#F0997B" font-size="11">2204 260KV motor</text>
  <text x="545" y="178" fill="#D85A30" font-size="10">+ 3D printed wheel</text>

  <line x1="440" y1="279" x2="540" y2="230" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="3 2"/>
  <circle cx="440" cy="279" r="2" fill="#BA7517"/>
  <text x="545" y="234" fill="#EF9F27" font-size="11">LiPo battery</text>
  <text x="545" y="248" fill="#BA7517" font-size="10">105×34×22mm</text>

  <line x1="440" y1="329" x2="540" y2="300" stroke="#378ADD" stroke-width="0.5" stroke-dasharray="3 2"/>
  <circle cx="440" cy="329" r="2" fill="#378ADD"/>
  <text x="545" y="304" fill="#85B7EB" font-size="11">PCB tray</text>
  <text x="545" y="318" fill="#378ADD" font-size="10">Nucleo + drivers</text>

  <line x1="325" y1="227" x2="540" y2="370" stroke="#1D9E75" stroke-width="0.5" stroke-dasharray="3 2"/>
  <circle cx="325" cy="227" r="2" fill="#1D9E75"/>
  <text x="545" y="374" fill="#5DCAA5" font-size="11">ICM-42688-P IMU</text>
  <text x="545" y="388" fill="#1D9E75" font-size="10">at center of mass</text>

  <!-- Dimension lines -->
  <line x1="175" y1="430" x2="475" y2="430" stroke="#5F5E5A" stroke-width="0.8"/>
  <line x1="175" y1="425" x2="175" y2="435" stroke="#5F5E5A" stroke-width="0.8"/>
  <line x1="475" y1="425" x2="475" y2="435" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="325" y="448" fill="#888780" font-size="12" text-anchor="middle">150 mm</text>

  <line x1="140" y1="60" x2="140" y2="360" stroke="#5F5E5A" stroke-width="0.8"/>
  <line x1="135" y1="60" x2="145" y2="60" stroke="#5F5E5A" stroke-width="0.8"/>
  <line x1="135" y1="360" x2="145" y2="360" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="125" y="215" fill="#888780" font-size="12" text-anchor="middle" transform="rotate(-90 125 215)">150 mm</text>

  <!-- Notes -->
  <text x="30" y="490" fill="#888780" font-size="11" font-weight="bold">Build notes:</text>
  <text x="30" y="508" fill="#888780" font-size="10">Frame: 12 × 150mm 2020 aluminum extrusion + 8 × 3D printed corner brackets (M4 T-nuts)</text>
  <text x="30" y="524" fill="#888780" font-size="10">Motors: 3 orthogonal faces (X=left, Y=top, Z=right) · Motors point inward, wheels protrude through face openings</text>
  <text x="30" y="540" fill="#888780" font-size="10">IMU: mounted at geometric center of cube on 3D printed bracket (center of mass = center of rotation)</text>
  <text x="30" y="556" fill="#888780" font-size="10">Wall panels: 3mm aluminum sheet or 3mm acrylic for visibility · Fastened with M3 countersunk screws</text>
  <text x="30" y="572" fill="#888780" font-size="10">Cable routing: 3D printed cable guides snap onto extrusion · Keep motor phase wires away from SPI lines</text>
  <text x="30" y="588" fill="#888780" font-size="10">Printed parts: PETG recommended · motor_mount.scad · reaction_wheel.scad · pcb_tray.scad · battery_bay.scad</text>

</svg>
