<svg width="900" height="620" viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="900" height="620" fill="#0d1117"/>
  <text x="450" y="35" fill="#e6edf3" font-size="18" font-weight="bold" text-anchor="middle">Self-Balancing Cube — System Block Diagram</text>

  <!-- Power domain -->
  <rect x="40" y="60" width="180" height="130" rx="10" fill="none" stroke="#BA7517" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="130" y="80" fill="#BA7517" font-size="12" text-anchor="middle">POWER</text>
  <rect x="55" y="88" width="150" height="44" rx="6" fill="#412402" stroke="#BA7517" stroke-width="0.8"/>
  <text x="130" y="106" fill="#FAC775" font-size="12" font-weight="bold" text-anchor="middle">3S LiPo 1300mAh</text>
  <text x="130" y="122" fill="#EF9F27" font-size="10" text-anchor="middle">11.1V · 14.4Wh · XT60</text>
  <rect x="55" y="142" width="150" height="38" rx="6" fill="#412402" stroke="#BA7517" stroke-width="0.8"/>
  <text x="130" y="158" fill="#FAC775" font-size="12" font-weight="bold" text-anchor="middle">5V BEC Regulator</text>
  <text x="130" y="172" fill="#EF9F27" font-size="10" text-anchor="middle">12V → 5V for MCU</text>

  <!-- Sensing domain -->
  <rect x="260" y="60" width="180" height="90" rx="10" fill="none" stroke="#1D9E75" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="350" y="80" fill="#1D9E75" font-size="12" text-anchor="middle">SENSING</text>
  <rect x="275" y="88" width="150" height="50" rx="6" fill="#04342C" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="350" y="108" fill="#9FE1CB" font-size="12" font-weight="bold" text-anchor="middle">ICM-42688-P IMU</text>
  <text x="350" y="124" fill="#5DCAA5" font-size="10" text-anchor="middle">6-DOF · SPI · 20-bit ADC</text>

  <!-- Processing domain -->
  <rect x="260" y="175" width="180" height="130" rx="10" fill="none" stroke="#185FA5" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="350" y="195" fill="#185FA5" font-size="12" text-anchor="middle">PROCESSING</text>
  <rect x="275" y="203" width="150" height="44" rx="6" fill="#042C53" stroke="#378ADD" stroke-width="0.8"/>
  <text x="350" y="221" fill="#B5D4F4" font-size="12" font-weight="bold" text-anchor="middle">STM32 Nucleo F446RE</text>
  <text x="350" y="237" fill="#85B7EB" font-size="10" text-anchor="middle">180MHz · FPU · 1kHz loop</text>
  <rect x="275" y="257" width="150" height="38" rx="6" fill="#042C53" stroke="#378ADD" stroke-width="0.8"/>
  <text x="350" y="273" fill="#B5D4F4" font-size="12" font-weight="bold" text-anchor="middle">PID Controller</text>
  <text x="350" y="289" fill="#85B7EB" font-size="10" text-anchor="middle">roll + pitch axes</text>

  <!-- Actuation domain -->
  <rect x="480" y="60" width="180" height="260" rx="10" fill="none" stroke="#993C1D" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="570" y="80" fill="#993C1D" font-size="12" text-anchor="middle">ACTUATION</text>
  <rect x="495" y="88" width="150" height="44" rx="6" fill="#4A1B0C" stroke="#D85A30" stroke-width="0.8"/>
  <text x="570" y="106" fill="#F5C4B3" font-size="12" font-weight="bold" text-anchor="middle">SimpleFOC Driver X</text>
  <text x="570" y="122" fill="#F0997B" font-size="10" text-anchor="middle">roll motor · 3-PWM</text>
  <rect x="495" y="142" width="150" height="44" rx="6" fill="#4A1B0C" stroke="#D85A30" stroke-width="0.8"/>
  <text x="570" y="160" fill="#F5C4B3" font-size="12" font-weight="bold" text-anchor="middle">SimpleFOC Driver Y</text>
  <text x="570" y="176" fill="#F0997B" font-size="10" text-anchor="middle">pitch motor · 3-PWM</text>
  <rect x="495" y="196" width="150" height="44" rx="6" fill="#4A1B0C" stroke="#D85A30" stroke-width="0.8"/>
  <text x="570" y="214" fill="#F5C4B3" font-size="12" font-weight="bold" text-anchor="middle">SimpleFOC Driver Z</text>
  <text x="570" y="230" fill="#F0997B" font-size="10" text-anchor="middle">yaw motor · 3-PWM</text>
  <rect x="495" y="250" width="150" height="36" rx="6" fill="#3d1a08" stroke="#D85A30" stroke-width="0.8"/>
  <text x="570" y="273" fill="#F5C4B3" font-size="11" font-weight="bold" text-anchor="middle">2204 260KV Motors ×3</text>

  <!-- Debug domain -->
  <rect x="40" y="330" width="180" height="90" rx="10" fill="none" stroke="#534AB7" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="130" y="350" fill="#534AB7" font-size="12" text-anchor="middle">DEBUG</text>
  <rect x="55" y="358" width="150" height="50" rx="6" fill="#26215C" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="130" y="378" fill="#CECBF6" font-size="12" font-weight="bold" text-anchor="middle">USB Serial / ST-Link</text>
  <text x="130" y="394" fill="#AFA9EC" font-size="10" text-anchor="middle">115200 baud · CSV stream</text>

  <!-- Connections -->
  <!-- LiPo → BEC -->
  <line x1="130" y1="132" x2="130" y2="142" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- BEC → MCU -->
  <path d="M205 161 L240 161 L240 225 L275 225" fill="none" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- LiPo → Drivers power -->
  <path d="M220 110 L460 110 L460 110 L495 110" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="5 2" marker-end="url(#arr)"/>
  <path d="M460 110 L460 164 L495 164" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="5 2" marker-end="url(#arr)"/>
  <path d="M460 110 L460 218 L495 218" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="5 2" marker-end="url(#arr)"/>
  <!-- IMU → MCU SPI -->
  <line x1="350" y1="138" x2="350" y2="203" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- MCU → Drivers PWM -->
  <path d="M425 221 L455 221 L455 110 L495 110" fill="none" stroke="#378ADD" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr)"/>
  <path d="M425 275 L455 275 L455 164 L495 164" fill="none" stroke="#378ADD" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr)"/>
  <!-- MCU → Debug -->
  <path d="M275 275 L240 275 L240 383 L205 383" fill="none" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Mechanical bar -->
  <rect x="40" y="460" width="620" height="60" rx="10" fill="none" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="350" y="480" fill="#888780" font-size="12" text-anchor="middle">MECHANICAL — 15cm aluminum 2020 extrusion frame</text>
  <rect x="55" y="488" width="120" height="24" rx="4" fill="#2C2C2A" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="115" y="504" fill="#B4B2A9" font-size="10" text-anchor="middle">Cube body frame</text>
  <rect x="190" y="488" width="120" height="24" rx="4" fill="#2C2C2A" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="250" y="504" fill="#B4B2A9" font-size="10" text-anchor="middle">Motor mounts ×3</text>
  <rect x="325" y="488" width="120" height="24" rx="4" fill="#2C2C2A" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="385" y="504" fill="#B4B2A9" font-size="10" text-anchor="middle">Reaction wheels ×3</text>
  <rect x="460" y="488" width="180" height="24" rx="4" fill="#2C2C2A" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="550" y="504" fill="#B4B2A9" font-size="10" text-anchor="middle">PCB tray + battery bay</text>

  <!-- Legend -->
  <text x="40" y="555" fill="#888780" font-size="11">Legend:</text>
  <line x1="95" y1="551" x2="130" y2="551" stroke="#E24B4A" stroke-width="2" stroke-dasharray="5 2"/>
  <text x="135" y="555" fill="#888780" font-size="10">Power 11V</text>
  <line x1="200" y1="551" x2="235" y2="551" stroke="#BA7517" stroke-width="2"/>
  <text x="240" y="555" fill="#888780" font-size="10">Power 5V</text>
  <line x1="295" y1="551" x2="330" y2="551" stroke="#1D9E75" stroke-width="2"/>
  <text x="335" y="555" fill="#888780" font-size="10">SPI data</text>
  <line x1="385" y1="551" x2="420" y2="551" stroke="#378ADD" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="425" y="555" fill="#888780" font-size="10">PWM control</text>
  <line x1="500" y1="551" x2="535" y2="551" stroke="#7F77DD" stroke-width="2"/>
  <text x="540" y="555" fill="#888780" font-size="10">UART debug</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>
