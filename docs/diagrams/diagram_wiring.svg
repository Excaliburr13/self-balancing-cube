<svg width="900" height="660" viewBox="0 0 900 660" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="900" height="660" fill="#0d1117"/>
  <text x="450" y="30" fill="#e6edf3" font-size="16" font-weight="bold" text-anchor="middle">Self-Balancing Cube — Wiring Schematic</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- LiPo -->
  <rect x="30" y="280" width="130" height="56" rx="8" fill="#412402" stroke="#BA7517" stroke-width="1"/>
  <text x="95" y="303" fill="#FAC775" font-size="12" font-weight="bold" text-anchor="middle">LiPo 3S</text>
  <text x="95" y="321" fill="#EF9F27" font-size="10" text-anchor="middle">11.1V · XT60</text>

  <!-- BEC -->
  <rect x="30" y="390" width="130" height="44" rx="8" fill="#412402" stroke="#BA7517" stroke-width="1"/>
  <text x="95" y="409" fill="#FAC775" font-size="12" font-weight="bold" text-anchor="middle">5V BEC</text>
  <text x="95" y="425" fill="#EF9F27" font-size="10" text-anchor="middle">LM2596 module</text>

  <!-- STM32 Nucleo -->
  <rect x="290" y="220" width="200" height="200" rx="10" fill="#042C53" stroke="#378ADD" stroke-width="1.5"/>
  <text x="390" y="245" fill="#B5D4F4" font-size="13" font-weight="bold" text-anchor="middle">STM32 Nucleo</text>
  <text x="390" y="263" fill="#85B7EB" font-size="11" text-anchor="middle">F446RE</text>
  <text x="300" y="290" fill="#85B7EB" font-size="10">PA4 — CS</text>
  <text x="300" y="308" fill="#85B7EB" font-size="10">PA5 — SCK</text>
  <text x="300" y="326" fill="#85B7EB" font-size="10">PA6 — MISO</text>
  <text x="300" y="344" fill="#85B7EB" font-size="10">PA7 — MOSI</text>
  <text x="300" y="362" fill="#85B7EB" font-size="10">5V — power in</text>
  <text x="478" y="290" fill="#85B7EB" font-size="10" text-anchor="end">PA8/9/10</text>
  <text x="478" y="308" fill="#85B7EB" font-size="10" text-anchor="end">PB6/7/8</text>
  <text x="478" y="326" fill="#85B7EB" font-size="10" text-anchor="end">PC6/7/8</text>
  <text x="478" y="362" fill="#85B7EB" font-size="10" text-anchor="end">USB</text>

  <!-- IMU -->
  <rect x="30" y="80" width="150" height="80" rx="8" fill="#04342C" stroke="#1D9E75" stroke-width="1"/>
  <text x="105" y="103" fill="#9FE1CB" font-size="12" font-weight="bold" text-anchor="middle">ICM-42688-P</text>
  <text x="105" y="121" fill="#5DCAA5" font-size="10" text-anchor="middle">IMU breakout</text>
  <text x="38" y="143" fill="#5DCAA5" font-size="9">VCC · GND</text>
  <text x="38" y="156" fill="#5DCAA5" font-size="9">CS · SCK · MISO · MOSI</text>

  <!-- FOC X -->
  <rect x="560" y="60" width="160" height="56" rx="8" fill="#4A1B0C" stroke="#D85A30" stroke-width="1"/>
  <text x="640" y="83" fill="#F5C4B3" font-size="12" font-weight="bold" text-anchor="middle">SimpleFOC X</text>
  <text x="640" y="101" fill="#F0997B" font-size="10" text-anchor="middle">roll · PA8/PA9/PA10</text>

  <!-- FOC Y -->
  <rect x="560" y="168" width="160" height="56" rx="8" fill="#4A1B0C" stroke="#D85A30" stroke-width="1"/>
  <text x="640" y="191" fill="#F5C4B3" font-size="12" font-weight="bold" text-anchor="middle">SimpleFOC Y</text>
  <text x="640" y="209" fill="#F0997B" font-size="10" text-anchor="middle">pitch · PB6/PB7/PB8</text>

  <!-- FOC Z -->
  <rect x="560" y="276" width="160" height="56" rx="8" fill="#4A1B0C" stroke="#D85A30" stroke-width="1"/>
  <text x="640" y="299" fill="#F5C4B3" font-size="12" font-weight="bold" text-anchor="middle">SimpleFOC Z</text>
  <text x="640" y="317" fill="#F0997B" font-size="10" text-anchor="middle">yaw · PC6/PC7/PC8</text>

  <!-- Motors -->
  <rect x="740" y="60" width="130" height="44" rx="8" fill="#2C2C2A" stroke="#5F5E5A" stroke-width="1"/>
  <text x="805" y="78" fill="#D3D1C7" font-size="11" font-weight="bold" text-anchor="middle">Motor X (roll)</text>
  <text x="805" y="94" fill="#B4B2A9" font-size="9" text-anchor="middle">2204 260KV</text>
  <rect x="740" y="168" width="130" height="44" rx="8" fill="#2C2C2A" stroke="#5F5E5A" stroke-width="1"/>
  <text x="805" y="186" fill="#D3D1C7" font-size="11" font-weight="bold" text-anchor="middle">Motor Y (pitch)</text>
  <text x="805" y="202" fill="#B4B2A9" font-size="9" text-anchor="middle">2204 260KV</text>
  <rect x="740" y="276" width="130" height="44" rx="8" fill="#2C2C2A" stroke="#5F5E5A" stroke-width="1"/>
  <text x="805" y="294" fill="#D3D1C7" font-size="11" font-weight="bold" text-anchor="middle">Motor Z (yaw)</text>
  <text x="805" y="310" fill="#B4B2A9" font-size="9" text-anchor="middle">2204 260KV</text>

  <!-- PC -->
  <rect x="290" y="490" width="200" height="44" rx="8" fill="#26215C" stroke="#7F77DD" stroke-width="1"/>
  <text x="390" y="508" fill="#CECBF6" font-size="12" font-weight="bold" text-anchor="middle">PC / Laptop</text>
  <text x="390" y="526" fill="#AFA9EC" font-size="10" text-anchor="middle">plotter.py · serial monitor</text>

  <!-- Wires -->
  <!-- LiPo → BEC -->
  <line x1="95" y1="336" x2="95" y2="390" stroke="#BA7517" stroke-width="2" marker-end="url(#arr)"/>
  <!-- BEC → Nucleo 5V -->
  <path d="M160 412 L240 412 L240 362 L290 362" fill="none" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="195" y="405" fill="#BA7517" font-size="10">5V</text>
  <!-- LiPo → FOC power (red dashed) -->
  <path d="M160 300 L530 300 L530 88 L560 88" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arr)"/>
  <path d="M530 300 L530 196 L560 196" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arr)"/>
  <path d="M530 300 L560 300" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arr)"/>
  <text x="535" y="180" fill="#E24B4A" font-size="10">11.1V</text>
  <!-- IMU → Nucleo SPI (green) -->
  <path d="M180 120 L260 120 L260 308 L290 308" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="210" y="113" fill="#1D9E75" font-size="10">SPI</text>
  <!-- Nucleo → FOC PWM (blue dashed) -->
  <line x1="490" y1="290" x2="560" y2="290" stroke="#378ADD" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr)"/>
  <path d="M490 308 L520 308 L520 196 L560 196" fill="none" stroke="#378ADD" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr)"/>
  <path d="M490 326 L520 326 L520 88 L560 88" fill="none" stroke="#378ADD" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr)"/>
  <!-- FOC → Motors (gray 3-phase) -->
  <line x1="720" y1="88" x2="740" y2="88" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="720" y1="196" x2="740" y2="196" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="720" y1="300" x2="740" y2="300" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="727" y="150" fill="#888780" font-size="9">3ph</text>
  <!-- Nucleo → PC USB -->
  <line x1="390" y1="420" x2="390" y2="490" stroke="#7F77DD" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arr)"/>
  <text x="398" y="458" fill="#7F77DD" font-size="10">USB</text>

  <!-- Legend -->
  <text x="30" y="580" fill="#888780" font-size="11">Legend:</text>
  <line x1="85" y1="576" x2="120" y2="576" stroke="#E24B4A" stroke-width="2" stroke-dasharray="5 2"/>
  <text x="125" y="580" fill="#888780" font-size="10">Power 11.1V</text>
  <line x1="210" y1="576" x2="245" y2="576" stroke="#BA7517" stroke-width="2"/>
  <text x="250" y="580" fill="#888780" font-size="10">Power 5V</text>
  <line x1="310" y1="576" x2="345" y2="576" stroke="#1D9E75" stroke-width="2"/>
  <text x="350" y="580" fill="#888780" font-size="10">SPI data</text>
  <line x1="405" y1="576" x2="440" y2="576" stroke="#378ADD" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="445" y="580" fill="#888780" font-size="10">PWM control</text>
  <line x1="525" y1="576" x2="560" y2="576" stroke="#888780" stroke-width="2"/>
  <text x="565" y="580" fill="#888780" font-size="10">3-phase motor</text>
  <line x1="655" y1="576" x2="690" y2="576" stroke="#7F77DD" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="695" y="580" fill="#888780" font-size="10">USB debug</text>

  <!-- Pin reference table -->
  <text x="30" y="615" fill="#888780" font-size="10">Pin ref: IMU→PA4(CS) PA5(SCK) PA6(MISO) PA7(MOSI) | MotorX→PA8/9/10 | MotorY→PB6/7/8 | MotorZ→PC6/7/8 | IMU INT→PB0</text>
</svg>
